<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<meta name="theme-color" content="#0d0d0f" />
<title>El Topo</title>
<style>
  :root{
    --bg:#0d0d0f;--panel:#161619;--panel-2:#1e1e23;--stroke:rgba(255,255,255,.07);
    --red:#e63140;--red-soft:#b5232f;--red-glow:rgba(230,49,64,.35);
    --txt:#f4f4f6;--muted:#8a8a93;--ok:#2ecc71;--radius:22px;
    --font:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;padding:0;background:var(--bg);color:var(--txt);font-family:var(--font);overscroll-behavior:none}
  body{max-width:480px;margin:0 auto;min-height:100vh;position:relative;padding-bottom:92px}
  h1,h2,h3{margin:0;font-weight:800;letter-spacing:-.02em}
  .muted{color:var(--muted)}.red{color:var(--red)}.hidden{display:none!important}
  .topbar{display:flex;align-items:center;justify-content:space-between;padding:20px 20px 8px}
  .topbar .hi{font-size:13px;color:var(--muted)}.topbar .name{font-size:20px;font-weight:800}
  .avatar{width:46px;height:46px;border-radius:50%;object-fit:cover;background:var(--panel-2);border:1px solid var(--stroke)}
  .wrap{padding:0 20px}
  .card{background:var(--panel);border:1px solid var(--stroke);border-radius:var(--radius);padding:20px;margin-bottom:16px}
  .card.hero{background:linear-gradient(160deg,#1c1c21 0%,#121214 100%);position:relative;overflow:hidden}
  .card.red{background:linear-gradient(150deg,var(--red) 0%,var(--red-soft) 100%);border:none;box-shadow:0 12px 30px -10px var(--red-glow)}
  .eyebrow{font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--muted);font-weight:700}
  .big{font-size:42px;font-weight:800;line-height:1.02;letter-spacing:-.03em}
  .btn{display:flex;align-items:center;justify-content:center;gap:8px;width:100%;border:none;border-radius:18px;
    padding:18px;font-size:16px;font-weight:700;font-family:var(--font);cursor:pointer;transition:transform .08s ease,opacity .2s}
  .btn:active{transform:scale(.97)}
  .btn-primary{background:var(--red);color:#fff;box-shadow:0 10px 24px -8px var(--red-glow)}
  .btn-ghost{background:var(--panel-2);color:var(--txt);border:1px solid var(--stroke)}
  .btn-danger{background:transparent;color:var(--red);border:1px solid var(--red)}
  .btn-block{margin-top:10px}.btn:disabled{opacity:.45;cursor:not-allowed}
  .btn-sm{padding:11px 14px;font-size:14px;border-radius:13px;width:auto}
  label.fl{display:block;font-size:12px;color:var(--muted);margin:14px 2px 6px;font-weight:600}
  input,select,textarea{width:100%;background:var(--panel-2);border:1px solid var(--stroke);border-radius:14px;
    padding:15px;color:var(--txt);font-size:16px;font-family:var(--font);outline:none}
  input:focus,select:focus,textarea:focus{border-color:var(--red)}
  textarea{resize:vertical;min-height:90px}
  .nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:480px;
    background:rgba(13,13,15,.92);backdrop-filter:blur(14px);border-top:1px solid var(--stroke);
    display:flex;justify-content:space-around;padding:10px 8px calc(10px + env(safe-area-inset-bottom))}
  .nav button{background:none;border:none;color:var(--muted);font-size:11px;font-weight:600;display:flex;
    flex-direction:column;align-items:center;gap:4px;cursor:pointer;padding:6px 8px;border-radius:12px;flex:1}
  .nav button .ic{font-size:20px}.nav button.active{color:var(--red)}
  .rank-row{display:flex;align-items:center;gap:14px;padding:14px 0;border-bottom:1px solid var(--stroke)}
  .rank-row:last-child{border-bottom:none}
  .rank-pos{width:26px;font-weight:800;color:var(--muted);text-align:center}.rank-pos.top{color:var(--red)}
  .rank-pts{margin-left:auto;font-weight:800;font-size:18px}
  .pill{display:inline-flex;align-items:center;gap:6px;background:var(--panel-2);border:1px solid var(--stroke);
    border-radius:999px;padding:7px 13px;font-size:12px;font-weight:600;margin:0 6px 6px 0}
  .pill.red{background:var(--red);border:none;color:#fff}.pill.ok{background:var(--ok);border:none;color:#06210f}
  .feed-item{background:var(--panel-2);border:1px solid var(--stroke);border-radius:16px;overflow:hidden;margin-bottom:14px}
  .feed-item img{width:100%;display:block}.feed-item .body{padding:14px}.feed-item audio{width:100%;margin-top:8px}
  .timer{font-size:34px;font-weight:800;text-align:center;letter-spacing:.02em}.timer.warn{color:var(--red)}
  .qprogress{height:6px;background:var(--panel-2);border-radius:99px;overflow:hidden;margin:12px 0}
  .qprogress > i{display:block;height:100%;background:var(--red);transition:width .3s}
  .opt{display:block;width:100%;text-align:left;background:var(--panel-2);border:1px solid var(--stroke);
    border-radius:14px;padding:16px;margin-bottom:10px;color:var(--txt);font-size:16px;font-weight:600;cursor:pointer}
  .opt.sel{background:var(--red);border-color:var(--red);color:#fff}
  .opt-photo{display:flex;align-items:center;gap:12px}.opt-photo img{width:40px;height:40px;border-radius:50%;object-fit:cover}
  .center{text-align:center}
  .spinner{width:34px;height:34px;border:3px solid var(--stroke);border-top-color:var(--red);border-radius:50%;
    animation:spin .7s linear infinite;margin:30px auto}
  @keyframes spin{to{transform:rotate(360deg)}}
  .toast{position:fixed;bottom:110px;left:50%;transform:translateX(-50%);background:var(--panel-2);
    border:1px solid var(--stroke);color:var(--txt);padding:13px 20px;border-radius:14px;font-size:14px;font-weight:600;
    z-index:999;opacity:0;transition:opacity .25s;max-width:90%;text-align:center}
  .toast.show{opacity:1}
  .divider{height:1px;background:var(--stroke);margin:18px 0}
  .row-2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
  .stat{background:var(--panel-2);border:1px solid var(--stroke);border-radius:16px;padding:16px}
  .stat .l{font-size:12px;color:var(--muted)}.stat .v{font-size:26px;font-weight:800;margin-top:4px}
  .self-q{display:flex;align-items:center;gap:10px;padding:11px 0;border-bottom:1px solid var(--stroke)}
  .self-q:last-child{border-bottom:none}.self-q .qt{flex:1;font-size:13px}.self-q select{width:auto;padding:9px 11px;font-size:14px}
  .grid-q{border:1px solid var(--stroke);border-radius:14px;padding:14px;margin-bottom:12px;background:var(--panel-2)}
  .grid-q .qtxt{font-weight:700;font-size:14px;margin-bottom:10px}
  .grid-row{display:flex;align-items:center;gap:8px;margin-bottom:8px}
  .grid-row .pn{flex:1;font-size:13px;color:var(--muted)}.grid-row select{width:auto;padding:8px 10px;font-size:14px}
  .steps{display:flex;gap:6px;margin:14px 0}
  .step{flex:1;height:5px;border-radius:99px;background:var(--panel-2)}.step.on{background:var(--red)}
  @media (prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}}
</style>
</head>
<body>

<!-- ============ AUTH ============ -->
<div id="auth" class="wrap" style="padding-top:60px">
  <div class="center" style="margin-bottom:30px">
    <div style="font-size:54px">🕵️</div>
    <h1 style="font-size:38px;margin-top:8px">El Topo</h1>
    <p class="muted">Descubrí quién es. Cada semana.</p>
  </div>
  <div class="card" id="loginCard">
    <h3 style="margin-bottom:6px">Iniciar sesión</h3>
    <label class="fl">Usuario</label>
    <input id="liUser" autocapitalize="none" autocomplete="username" placeholder="tu usuario" />
    <label class="fl">Contraseña</label>
    <input id="liPass" type="password" autocomplete="current-password" placeholder="••••••" />
    <button class="btn btn-primary btn-block" onclick="doLogin()">Entrar</button>
    <p class="center muted" style="margin:16px 0 0;font-size:14px">¿No tenés cuenta?
      <a href="#" onclick="showRegister();return false" class="red" style="text-decoration:none;font-weight:700">Registrate</a></p>
  </div>
  <div class="card hidden" id="regCard">
    <h3 style="margin-bottom:6px">Crear cuenta</h3>
    <label class="fl">Nombre para mostrar</label>
    <input id="rgName" placeholder="Ej. Iván" />
    <label class="fl">Usuario</label>
    <input id="rgUser" autocapitalize="none" placeholder="elegí un usuario" />
    <label class="fl">Contraseña</label>
    <input id="rgPass" type="password" placeholder="••••••" />
    <label class="fl">Foto de perfil (para la votación)</label>
    <input id="rgPhoto" type="file" accept="image/*" />
    <button class="btn btn-primary btn-block" id="rgBtn" onclick="doRegister()">Crear cuenta</button>
    <p class="center muted" style="margin:16px 0 0;font-size:14px">¿Ya tenés cuenta?
      <a href="#" onclick="showLogin();return false" class="red" style="text-decoration:none;font-weight:700">Iniciá sesión</a></p>
  </div>
</div>

<!-- ============ APP ============ -->
<div id="app" class="hidden">
  <div class="topbar">
    <div><div class="hi">Hola de nuevo</div><div class="name" id="meName">—</div></div>
    <img id="meAvatar" class="avatar" src="" alt="" onclick="go('perfil')" style="cursor:pointer"/>
  </div>
  <section id="view-home" class="wrap view"></section>
  <section id="view-topo" class="wrap view hidden"></section>
  <section id="view-feed" class="wrap view hidden"></section>
  <section id="view-vote" class="wrap view hidden"></section>
  <section id="view-perfil" class="wrap view hidden"></section>
  <section id="view-admin" class="wrap view hidden"></section>
  <nav class="nav">
    <button data-v="home" class="active" onclick="go('home')"><span class="ic">🏠</span>Inicio</button>
    <button data-v="topo" onclick="go('topo')"><span class="ic">🕵️</span>Topo</button>
    <button data-v="feed" onclick="go('feed')"><span class="ic">📸</span>Pistas</button>
    <button data-v="vote" onclick="go('vote')"><span class="ic">🗳️</span>Votar</button>
    <button data-v="perfil" onclick="go('perfil')"><span class="ic">👤</span>Perfil</button>
    <button data-v="admin" id="navAdmin" class="hidden" onclick="go('admin')"><span class="ic">⚙️</span>Admin</button>
  </nav>
</div>

<div id="toast" class="toast"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import {
  getFirestore, collection, doc, getDoc, getDocs, setDoc, addDoc, updateDoc,
  deleteDoc, query, where, onSnapshot, serverTimestamp, writeBatch
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

/* ---------- CONFIG ---------- */
const firebaseConfig = {
  apiKey: "AIzaSyBWXJP1dciLtw3oTjgqpgmXNth0AUX1KHk",
  authDomain: "apps-peri.firebaseapp.com",
  projectId: "apps-peri",
  storageBucket: "apps-peri.firebasestorage.app",
  messagingSenderId: "743307331446",
  appId: "1:743307331446:web:a5e9b2a82800697d095c57"
};
const CLOUD_NAME = "denvtixo2";
const UPLOAD_PRESET = "el_topo_uploads";

const fbApp = initializeApp(firebaseConfig);
const db = getFirestore(fbApp, "iddefaultv1");

const ROOT = doc(db, "eltopo", "main");
const playersCol  = collection(ROOT, "players");
const questionsCol= collection(ROOT, "questions");
const subsCol     = collection(ROOT, "submissions");
const respCol     = collection(ROOT, "responses");
const weeksCol    = collection(ROOT, "weeks");

/* ---------- Banco de preguntas (seed) ---------- */
const SEED_QUESTIONS = [
  {t:"¿El topo es hombre o mujer?", o:["Hombre","Mujer"]},
  {t:"¿El topo tiene más de 40 años?"},
  {t:"¿El topo tiene hijos?"},
  {t:"¿El topo tiene tatuajes?"},
  {t:"¿El topo es el mayor de sus hermanos?"},
  {t:"¿El topo va a la universidad actualmente?"},
  {t:"¿El topo cree en las energías?"},
  {t:"¿El topo juega o jugó al básquet alguna vez?"},
  {t:"¿El topo usa anteojos de ver?"},
  {t:"¿El topo está casado?"},
  {t:"¿El topo nació en CABA?"},
  {t:"¿El topo bebe alcohol?"},
  {t:"¿El topo fue policía?"},
  {t:"¿El topo sabe tocar la guitarra?"},
  {t:"¿El topo es team invierno o team verano?", o:["Invierno","Verano"]},
  {t:"¿El topo conoce el norte de Argentina?"},
  {t:"¿El topo instaló alguna vez cámaras de seguridad?"},
  {t:"¿El topo mira a menudo TikTok?"},
  {t:"¿El topo tomó clases de kayak?"},
  {t:"¿El topo tiene pasaporte europeo?"},
];
const COLORS = ["rojo","azul","verde","amarillo","naranja","violeta","rosa","marrón","negro","blanco","gris","celeste","dorado","plateado","bordó"];
const CONSIGNAS = [
  {id:1,n:"El objeto X",  tipo:"foto", d:"Fotografiá un objeto que sea predominantemente del color {COLOR}. Puede estar en cualquier lugar."},
  {id:2,n:"El cielo",     tipo:"foto", d:"Fotografiá el cielo en un atardecer."},
  {id:3,n:"El recuerdo falso", tipo:"texto", d:"Publicá un recuerdo compartido que nunca ocurrió, narrado como si fuera real."},
  {id:4,n:"El número secreto", tipo:"texto", d:"Publicá un número del 1 al 100 con una pista críptica de por qué lo elegiste."},
  {id:5,n:"El detalle",   tipo:"foto", d:"Foto en macro/zoom de una textura o superficie, tan de cerca que no se reconozca qué es."},
  {id:6,n:"El objeto ajeno", tipo:"foto", d:"Fotografiá algo que no te pertenece."},
  {id:7,n:"La palabra del día", tipo:"texto", d:"Publicá una palabra inventada con su definición."},
  {id:8,n:"El lugar inusual", tipo:"foto", d:"Foto de un lugar al que no vas seguido, en cualquier parte."},
  {id:9,n:"La pregunta sin respuesta", tipo:"texto", d:"Publicá una pregunta filosófica o absurda sin contexto."},
  {id:10,n:"El sonido",   tipo:"audio", d:"Grabá un sonido de tu entorno sin revelar qué es."},
];

/* ---------- State ---------- */
let me=null, players=[], questions=[], weeks=[], responses=[], subs=[];
let unsub=[], ensuring=false, current="home";

/* ---------- Helpers ---------- */
const $=s=>document.querySelector(s);
const el=(t,c,h)=>{const e=document.createElement(t);if(c)e.className=c;if(h!=null)e.innerHTML=h;return e;};
function toast(m){const t=$("#toast");t.textContent=m;t.classList.add("show");setTimeout(()=>t.classList.remove("show"),2600);}
function esc(s){return (s||"").replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));}
async function hash(str){const b=await crypto.subtle.digest("SHA-256",new TextEncoder().encode(str));return [...new Uint8Array(b)].map(x=>x.toString(16).padStart(2,"0")).join("");}
function defaultAvatar(name){const l=(name||"?")[0].toUpperCase();
  return `data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='80' height='80'><rect width='80' height='80' fill='%231e1e23'/><text x='50%25' y='54%25' font-size='34' fill='%23e63140' text-anchor='middle' dominant-baseline='middle' font-family='sans-serif'>${l}</text></svg>`;}
async function uploadToCloudinary(file){
  const fd=new FormData();fd.append("file",file);fd.append("upload_preset",UPLOAD_PRESET);
  const res=await fetch(`https://api.cloudinary.com/v1_1/${CLOUD_NAME}/auto/upload`,{method:"POST",body:fd});
  if(!res.ok) throw new Error("Falló la subida");const d=await res.json();return d.secure_url;}

/* ---------- PRNG determinístico ---------- */
function seedFrom(str){let h=2166136261;for(let i=0;i<str.length;i++){h^=str.charCodeAt(i);h=Math.imul(h,16777619);}return h>>>0;}
function mulberry32(a){return function(){a|=0;a=a+0x6D2B79F5|0;let t=Math.imul(a^a>>>15,1|a);t=t+Math.imul(t^t>>>7,61|t)^t;return((t^t>>>14)>>>0)/4294967296;};}

/* ---------- Calendario / fases ---------- */
function weekAnchor(now=new Date()){
  const d=new Date(now), day=d.getDay();
  const sun=new Date(d); sun.setDate(d.getDate()-day); sun.setHours(19,0,0,0);
  if(d>=sun) return sun;
  const prev=new Date(sun); prev.setDate(sun.getDate()-7); return prev;
}
function weekIdOf(anchor){const y=anchor.getFullYear(),m=String(anchor.getMonth()+1).padStart(2,"0"),dd=String(anchor.getDate()).padStart(2,"0");return `${y}-${m}-${dd}`;}
function bounds(anchor){
  const wed=new Date(anchor);wed.setDate(anchor.getDate()+3);wed.setHours(12,0,0,0);
  const sat=new Date(anchor);sat.setDate(anchor.getDate()+6);sat.setHours(12,0,0,0);
  const sunClose=new Date(anchor);sunClose.setDate(anchor.getDate()+7);sunClose.setHours(12,0,0,0);
  const nextAnchor=new Date(anchor);nextAnchor.setDate(anchor.getDate()+7);nextAnchor.setHours(19,0,0,0);
  return {wed,sat,sunClose,nextAnchor};
}
function phaseOf(anchor,now=new Date()){
  const {wed,sat,sunClose}=bounds(anchor);
  if(now<wed) return "c1";
  if(now<sat) return "c2";
  if(now<sunClose) return "voting";
  return "results";
}
function currentWeek(){const id=weekIdOf(weekAnchor());return weeks.find(w=>w.id===id)||null;}
function fmtDate(ts){const d=new Date(ts);return d.toLocaleString("es-AR",{weekday:"short",hour:"2-digit",minute:"2-digit"});}

/* ============ AUTH ============ */
window.showRegister=()=>{$("#loginCard").classList.add("hidden");$("#regCard").classList.remove("hidden");};
window.showLogin=()=>{$("#regCard").classList.add("hidden");$("#loginCard").classList.remove("hidden");};

window.doRegister=async()=>{
  const name=$("#rgName").value.trim(), user=$("#rgUser").value.trim().toLowerCase(), pass=$("#rgPass").value;
  const photoFile=$("#rgPhoto").files[0];
  if(!name||!user||!pass){toast("Completá nombre, usuario y contraseña");return;}
  const btn=$("#rgBtn");btn.disabled=true;btn.textContent="Creando…";
  try{
    const dup=await getDocs(query(playersCol,where("username","==",user)));
    if(!dup.empty){toast("Ese usuario ya existe");btn.disabled=false;btn.textContent="Crear cuenta";return;}
    let photoURL="";
    if(photoFile) photoURL=await uploadToCloudinary(photoFile);
    await seedIfNeeded();
    const all=await getDocs(playersCol);
    const isFirst=all.empty;
    const uid=crypto.randomUUID();
    await setDoc(doc(playersCol,uid),{uid,username:user,displayName:name,pass:await hash(pass),photoURL,isAdmin:isFirst,selfAnswers:{},createdAt:serverTimestamp()});
    localStorage.setItem("topo_uid",uid);
    toast(isFirst?"Cuenta admin creada 🎉":"Cuenta creada 🎉");
    await bootSession(uid);
  }catch(e){console.error(e);toast("Error: "+e.message);btn.disabled=false;btn.textContent="Crear cuenta";}
};
window.doLogin=async()=>{
  const user=$("#liUser").value.trim().toLowerCase(), pass=$("#liPass").value;
  if(!user||!pass){toast("Ingresá usuario y contraseña");return;}
  const s=await getDocs(query(playersCol,where("username","==",user)));
  if(s.empty){toast("Usuario no encontrado");return;}
  const d=s.docs[0];
  if(d.data().pass!==await hash(pass)){toast("Contraseña incorrecta");return;}
  localStorage.setItem("topo_uid",d.id);
  await bootSession(d.id);
};
window.logout=()=>{localStorage.removeItem("topo_uid");unsub.forEach(u=>{try{u();}catch(e){}});location.reload();};

async function seedIfNeeded(){
  const qs=await getDocs(questionsCol);
  if(!qs.empty) return;
  const batch=writeBatch(db);
  SEED_QUESTIONS.forEach((q,i)=>batch.set(doc(questionsCol),{text:q.t,options:q.o||["Sí","No"],answers:{},order:i}));
  await batch.commit();
}

/* ============ SESSION ============ */
async function bootSession(uid){
  const snap=await getDoc(doc(playersCol,uid));
  if(!snap.exists()){localStorage.removeItem("topo_uid");return;}
  me={id:snap.id,...snap.data()};
  $("#auth").classList.add("hidden");$("#app").classList.remove("hidden");
  refreshMeHeader();
  if(me.isAdmin) $("#navAdmin").classList.remove("hidden");
  unsub.push(onSnapshot(playersCol,s=>{players=s.docs.map(d=>({id:d.id,...d.data()}));const m=players.find(p=>p.id===me.id);if(m)me=m;refreshMeHeader();afterData();}));
  unsub.push(onSnapshot(questionsCol,s=>{questions=s.docs.map(d=>({id:d.id,...d.data()})).sort((a,b)=>(a.order||0)-(b.order||0));afterData();}));
  unsub.push(onSnapshot(weeksCol,s=>{weeks=s.docs.map(d=>({id:d.id,...d.data()}));afterData();}));
  unsub.push(onSnapshot(respCol,s=>{responses=s.docs.map(d=>({id:d.id,...d.data()}));afterData();}));
  unsub.push(onSnapshot(subsCol,s=>{subs=s.docs.map(d=>({id:d.id,...d.data()}));renderCurrent();}));
  setInterval(()=>{ensureWeek();renderCurrent();},30000);
  go("home");
}
function refreshMeHeader(){if(!me)return;$("#meName").textContent=me.displayName;$("#meAvatar").src=me.photoURL||defaultAvatar(me.displayName);}
function afterData(){ensureWeek();renderCurrent();}

/* ---------- Crear semana automáticamente (determinístico) ---------- */
async function ensureWeek(){
  if(ensuring||!players.length||!questions.length) return;
  const anchor=weekAnchor(), id=weekIdOf(anchor);
  if(weeks.find(w=>w.id===id)) return;
  ensuring=true;
  try{
    const exist=await getDoc(doc(weeksCol,id));
    if(exist.exists()){ensuring=false;return;}
    const rng=mulberry32(seedFrom(id));
    const sorted=[...players].sort((a,b)=>a.id<b.id?-1:1);
    const topo=sorted[Math.floor(rng()*sorted.length)];
    const pool=[...CONSIGNAS];
    const c1=pool.splice(Math.floor(rng()*pool.length),1)[0];
    const c2=pool.splice(Math.floor(rng()*pool.length),1)[0];
    const color=COLORS[Math.floor(rng()*COLORS.length)];
    const qsorted=[...questions].sort((a,b)=>a.id<b.id?-1:1);
    for(let i=qsorted.length-1;i>0;i--){const j=Math.floor(rng()*(i+1));[qsorted[i],qsorted[j]]=[qsorted[j],qsorted[i]];}
    const qids=qsorted.slice(0,19).map(q=>q.id);
    await setDoc(doc(weeksCol,id),{id,anchor:anchor.getTime(),topoId:topo.id,consignas:[c1.id,c2.id],color,weeklyQuestions:qids,topoSubs:{},createdAt:serverTimestamp()},{merge:true});
  }catch(e){console.error("ensureWeek",e);}
  ensuring=false;
}

/* ============ RANKING (calculado en vivo) ============ */
function computeRanking(){
  const map={};players.forEach(p=>map[p.id]={player:p,pts:0});
  // aciertos de cada participante
  responses.forEach(r=>{if(map[r.playerId])map[r.playerId].pts+=(r.correct||0);});
  // bonus del topo en semanas ya cerradas
  weeks.forEach(w=>{
    const anchor=new Date(w.anchor);const {sunClose}=bounds(anchor);
    if(new Date()<sunClose) return; // semana no cerrada
    const parts=responses.filter(r=>r.week===w.id && r.playerId!==w.topoId);
    const avg=parts.length?parts.reduce((a,b)=>a+(b.correct||0),0)/parts.length:0;
    const bonus=Math.max(0,Math.floor(20-avg));
    if(map[w.topoId])map[w.topoId].pts+=bonus;
  });
  return Object.values(map).sort((a,b)=>b.pts-a.pts);
}

/* ============ TOPO ============ */
function renderTopo(){
  const v=$("#view-topo");v.innerHTML="";
  const w=currentWeek();const anchor=weekAnchor(),phase=phaseOf(anchor);
  if(!w){v.appendChild(empty("🕵️","Arrancando la semana","En un momento se asigna el topo. Volvé a entrar en unos segundos."));return;}
  const amTopo=w.topoId===me.id;
  if(!amTopo){v.appendChild(empty("🤫","No sos el topo","O al menos eso querés que crean 😏 Mirá las pistas y preparate para votar."));return;}
  if(phase==="voting"||phase==="results"){
    v.appendChild(empty("⌛","Tu trabajo terminó","Cumpliste como topo esta semana. Ahora esperá los resultados."));return;
  }
  const head=el("div","card red");
  head.innerHTML=`<div class="eyebrow" style="color:#ffd9dc">Confidencial</div>
    <div class="big" style="margin:8px 0">Sos el Topo 🕵️</div>
    <p style="margin:0;color:#ffe5e7">Cumplí tus consignas sin delatarte. Aparecen en Pistas de forma anónima.</p>`;
  v.appendChild(head);

  const {wed,sat}=bounds(anchor);
  (w.consignas||[]).forEach((cid,idx)=>{
    const c=CONSIGNAS.find(x=>x.id===cid);if(!c)return;
    const limite=idx===0?wed:sat;
    const open=(idx===0&&phase==="c1")||(idx===1);
    const done=(w.topoSubs||{})[cid];
    const desc=c.d.replace("{COLOR}",w.color||"—");
    const card=el("div","card");
    card.innerHTML=`<div class="eyebrow">Consigna ${idx+1} · límite ${fmtDate(limite)}</div>
      <h3 style="margin:6px 0">${c.n}</h3>
      <p class="muted" style="margin:0 0 12px">${esc(desc)}</p>
      <span class="pill ${done?'ok':''}">${done?'✓ Publicada':c.tipo.toUpperCase()}</span>`;
    if(done){v.appendChild(card);return;}
    if(!open){card.appendChild(el("p","muted",`<div style="margin-top:8px">${idx===0?"Plazo vencido.":"Se habilita cuando termine la consigna 1."}</div>`));v.appendChild(card);return;}
    if(c.tipo==="texto"){
      const ta=el("textarea");ta.placeholder="Escribí tu publicación…";
      const b=el("button","btn btn-primary btn-block","Publicar");
      b.onclick=async()=>{if(!ta.value.trim())return toast("Escribí algo");b.disabled=true;b.textContent="Publicando…";await publishSub(w,cid,{tipo:"texto",text:ta.value.trim()});};
      card.appendChild(ta);card.appendChild(b);
    }else{
      const inp=el("input");inp.type="file";inp.accept=c.tipo==="audio"?"audio/*":"image/*";
      const b=el("button","btn btn-primary btn-block","Subir y publicar");
      b.onclick=async()=>{const f=inp.files[0];if(!f)return toast("Elegí un archivo");b.disabled=true;b.textContent="Subiendo…";
        try{const url=await uploadToCloudinary(f);await publishSub(w,cid,{tipo:c.tipo,url});}catch(e){toast("Error al subir");b.disabled=false;b.textContent="Subir y publicar";}};
      card.appendChild(inp);card.appendChild(b);
    }
    v.appendChild(card);
  });
}
async function publishSub(w,cid,data){
  await addDoc(subsCol,{week:w.id,consignaId:cid,...data,createdAt:serverTimestamp()});
  await updateDoc(doc(weeksCol,w.id),{[`topoSubs.${cid}`]:true});
  toast("Publicado ✓");
}

/* ============ VOTE ============ */
let voteTimer=null;
function renderVote(){
  const v=$("#view-vote");v.innerHTML="";
  const w=currentWeek();const phase=phaseOf(weekAnchor());
  if(!w||phase!=="voting"){
    const next=phase==="results"?"La votación de esta semana ya cerró.":"La votación se abre el sábado al mediodía.";
    v.appendChild(empty("🗳️","Votación cerrada",next));return;}
  if(w.topoId===me.id){v.appendChild(empty("🙊","Sos el topo","Esta semana no votás. Esperá los resultados."));return;}
  if(responses.find(r=>r.week===w.id&&r.playerId===me.id)){
    v.appendChild(empty("✅","Ya respondiste","Tu cuestionario quedó guardado. Mirá el ranking cuando cierre la semana."));return;}
  startQuiz(v,w);
}
function startQuiz(v,w){
  const weekQs=(w.weeklyQuestions||[]).map(id=>questions.find(q=>q.id===id)).filter(Boolean);
  const others=players.filter(p=>p.id!==me.id);
  let idx=0,answers={};const TOTAL=weekQs.length+1,START=Date.now(),LIMIT=120000;
  const card=el("div","card");
  const timerEl=el("div","timer","2:00");const prog=el("div","qprogress","<i style='width:0%'></i>");const body=el("div");
  card.appendChild(timerEl);card.appendChild(prog);card.appendChild(body);v.appendChild(card);
  function tick(){const left=Math.max(0,LIMIT-(Date.now()-START)),s=Math.ceil(left/1000);
    timerEl.textContent=`${Math.floor(s/60)}:${String(s%60).padStart(2,"0")}`;timerEl.classList.toggle("warn",s<=30);
    if(left<=0){clearInterval(voteTimer);finish(true);}}
  clearInterval(voteTimer);voteTimer=setInterval(tick,250);tick();
  function paint(){prog.firstChild.style.width=`${(idx/TOTAL)*100}%`;body.innerHTML="";
    if(idx<weekQs.length){const q=weekQs[idx];
      body.appendChild(el("div","eyebrow",`Pregunta ${idx+1} de ${TOTAL}`));
      body.appendChild(el("h3","",`<div style="margin:10px 0 16px">${esc(q.text)}</div>`));
      (q.options||["Sí","No"]).forEach(opt=>{const b=el("button","opt",esc(opt));b.onclick=()=>{answers[q.id]=opt;idx++;step();};body.appendChild(b);});
    }else{body.appendChild(el("div","eyebrow",`Pregunta ${TOTAL} de ${TOTAL}`));
      body.appendChild(el("h3","",`<div style="margin:10px 0 16px">¿Quién es el topo?</div>`));
      others.forEach(p=>{const b=el("button","opt opt-photo",`<img src="${p.photoURL||defaultAvatar(p.displayName)}"/><span>${esc(p.displayName)}</span>`);
        b.onclick=()=>{answers.__identity=p.id;idx++;step();};body.appendChild(b);});}}
  function step(){if(idx>=TOTAL){clearInterval(voteTimer);finish(false);}else paint();}
  async function finish(timedOut){
    body.innerHTML=`<div class="spinner"></div><p class="center muted">Guardando…</p>`;
    const topo=players.find(p=>p.id===w.topoId);
    let correct=0;weekQs.forEach(q=>{const corr=(q.answers||{})[w.topoId];if(corr&&answers[q.id]===corr)correct++;});
    const gotIdentity=answers.__identity===w.topoId;if(gotIdentity)correct++;
    await setDoc(doc(respCol,`${w.id}_${me.id}`),{week:w.id,playerId:me.id,answers,correct,gotIdentity,timedOut,createdAt:serverTimestamp()});
    card.innerHTML=`<div class="center" style="padding:20px 0"><div style="font-size:46px">🎯</div>
      <h2 style="margin:10px 0">¡Listo!</h2>
      <p class="muted">Acertaste <b class="red">${correct}</b> de ${TOTAL}.</p>
      <p class="muted">${gotIdentity?"Y descubriste al topo 🕵️":"No diste con el topo esta vez."}</p>
      <p class="muted" style="font-size:12px;margin-top:10px">Los puntajes finales se publican el domingo al mediodía.</p></div>`;
  }
  paint();
}

      row.appendChild(sel);g.appendChild(row);});
    const del=el("button","btn btn-ghost btn-sm","Eliminar pregunta");del.style.marginTop="6px";
    del.onclick=async()=>{if(confirm("¿Eliminar esta pregunta?")){await deleteDoc(doc(questionsCol,q.id));toast("Eliminada");}};

async function forceNewWeek(){
  if(players.length<3)return toast("Necesitás al menos 3 jugadores");
  if(!questions.length)return toast("Cargá preguntas primero");
  if(!confirm("Esto reinicia la semana en curso con un nuevo topo y consignas. Se borran las publicaciones y votos de esta semana. ¿Seguir?"))return;
  const anchor=weekAnchor(),id=weekIdOf(anchor);
  // borrar subs y responses de esta semana
  const batch=writeBatch(db);
  const [s1,s2]=await Promise.all([getDocs(query(subsCol,where("week","==",id))),getDocs(query(respCol,where("week","==",id)))]);
  s1.forEach(d=>batch.delete(d.ref));s2.forEach(d=>batch.delete(d.ref));await batch.commit();
  // re-roll verdaderamente al azar
  const topo=players[Math.floor(Math.random()*players.length)];
  const pool=[...CONSIGNAS];const c1=pool.splice(Math.floor(Math.random()*pool.length),1)[0];const c2=pool.splice(Math.floor(Math.random()*pool.length),1)[0];
  const color=COLORS[Math.floor(Math.random()*COLORS.length)];
  const qids=[...questions].sort(()=>Math.random()-0.5).slice(0,19).map(q=>q.id);
  await setDoc(doc(weeksCol,id),{id,anchor:anchor.getTime(),topoId:topo.id,consignas:[c1.id,c2.id],color,weeklyQuestions:qids,topoSubs:{},forced:true,createdAt:serverTimestamp()});
  toast("Semana reiniciada 🎲");go("home");
}
